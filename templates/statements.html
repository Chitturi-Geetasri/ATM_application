<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1>Deposit Statements</h1>
        <table>
            <th>Amount</th><br>
            <th>Time</th>
            {% for i in deposit_userstatements %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
            </tr>
            {% endfor %}
        </table>
    </center>
    <center>
        <h1>Withdraw Statements</h1>
        <table>
            <th>Amount</th><br>
            <th>Time</th>
            {% for i in withdraw_userstatements %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
            </tr>
            {% endfor %}
        </table>
    </center>
</body>
</html>
