<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <label>Your Balance Amount : {{balance_amount}}</label>
        {% if balance_amount>500 %}
            {% if balance_amount <= 1000 %}
                <p>Ok to go</p>
            {% endif %}
        <p>Good</p>
        {% elif balance_amount=500 %}
        <p>Medium</p>
        {% else %}
        <p>Low</p>
        {% endif %}
    </center>
</body>
</html>
